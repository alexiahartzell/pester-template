<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>
      text { font-family: -apple-system, 'Inter', sans-serif; }
    </style>
  </defs>
  <rect width="720" height="380" rx="12" fill="#121215"/>

  <!-- Pie chart card -->
