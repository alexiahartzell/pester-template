    <rect x="40" y="166" width="8" height="48" rx="0" fill="#444"/>
    <rect x="40" y="166" width="0.5" height="48" fill="#1e1e22" rx="0"/>
    <line x1="42" y1="172" x2="46" y2="166" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="179" x2="48" y2="169" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="186" x2="48" y2="176" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="193" x2="48" y2="183" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="200" x2="48" y2="190" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="207" x2="48" y2="197" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="44" y1="214" x2="48" y2="204" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="68" cy="190" r="8" fill="none" stroke="#6b6b76" stroke-width="1.5"/>
    <text x="86" y="190" fill="#ededf0" font-size="14">finish draft of methods section</text>
    <circle cx="530" cy="190" r="3" fill="#8888a0"/>
    <circle cx="540" cy="190" r="3" fill="#8888a0"/>
    <circle cx="550" cy="190" r="3" fill="#8888a0"/>
    <text x="564" y="190" fill="#5eaaee" font-size="11">my research</text>
    <text x="647" y="190" fill="#ff6b6b" font-size="11">overdue</text>
  </g>

  <!-- Task 2: high priority, group code -->
  <g>
    <rect x="40" y="220" width="640" height="48" rx="10" fill="#1e1e22"/>
    <rect x="40" y="220" width="8" height="48" rx="0" fill="#444"/>
    <line x1="42" y1="226" x2="46" y2="220" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="233" x2="48" y2="223" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="240" x2="48" y2="230" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="247" x2="48" y2="237" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="254" x2="48" y2="244" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="42" y1="261" x2="48" y2="251" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="68" cy="244" r="8" fill="none" stroke="#6b6b76" stroke-width="1.5"/>
    <text x="86" y="244" fill="#ededf0" font-size="14">review pull request for data pipeline</text>
    <circle cx="555" cy="244" r="3" fill="#8888a0"/>
    <circle cx="565" cy="244" r="3" fill="#8888a0"/>
    <circle cx="575" cy="244" r="3" fill="#2e2e33"/>
    <text x="589" y="244" fill="#8b5ecf" font-size="11">group code</text>
  </g>

