  <text x="40" y="152" fill="#b0b0c0" font-size="11" font-weight="600" letter-spacing="1">TODAY</text>

  <!-- Task 1: high priority, my research, overdue -->
  <g>
    <rect x="40" y="166" width="640" height="48" rx="10" fill="#1e1e22"/>
