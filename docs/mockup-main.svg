  <!-- Section label -->
  <text x="40" y="155" fill="#b0b0c0" font-size="11" font-weight="600" letter-spacing="1">TOMORROW</text>

  <!-- Task 1 - high priority, group code -->
  <rect x="40" y="168" width="640" height="48" rx="10" fill="#1e1e22"/>
  <!-- Priority strip - diagonal lines for high -->
  <rect x="40" y="168" width="8" height="48" rx="4" fill="#444"/>
  <line x1="42" y1="180" x2="46" y2="168" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="188" x2="48" y2="172" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="196" x2="48" y2="180" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="204" x2="48" y2="188" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="212" x2="48" y2="196" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="216" x2="48" y2="206" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <!-- Checkbox -->
  <circle cx="72" cy="192" r="8" fill="none" stroke="#6b6b76" stroke-width="1.5"/>
  <!-- Difficulty dots -->
  <circle cx="560" cy="189" r="3" fill="#8888a0"/>
  <circle cx="570" cy="189" r="3" fill="#8888a0"/>
  <circle cx="580" cy="189" r="3" fill="#8888a0"/>
  <!-- Content -->
  <text x="92" y="196" fill="#ededf0" font-size="14">review tensor code partner submission</text>
  <text x="600" y="196" fill="#8b5ecf" font-size="11">group code</text>

  <!-- Task 2 - high priority, my research -->
  <rect x="40" y="222" width="640" height="48" rx="10" fill="#1e1e22"/>
  <rect x="40" y="222" width="8" height="48" rx="4" fill="#444"/>
  <line x1="42" y1="234" x2="46" y2="222" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="242" x2="48" y2="226" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="250" x2="48" y2="234" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="258" x2="48" y2="242" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="266" x2="48" y2="250" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
