<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <style>
      text { font-family: -apple-system, 'Inter', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#121215"/>

  <!-- Header -->
  <text x="40" y="45" fill="#b0b0c0" font-size="14" font-weight="600" letter-spacing="1">pester</text>
  <text x="40" y="62" fill="#6b6b76" font-size="11">3h 12m today · 18h 45m this week · avg 22h/wk</text>

  <!-- Buttons -->
  <rect x="420" y="28" width="90" height="30" rx="6" fill="#1e1e22" stroke="#2e2e33"/>
  <text x="443" y="48" fill="#ededf0" font-size="11">Process new</text>
  <rect x="518" y="28" width="90" height="30" rx="6" fill="#1e1e22" stroke="#2e2e33"/>
