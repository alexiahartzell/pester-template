  <rect x="40" y="398" width="152" height="70" rx="10" fill="#1e1e22"/>
  <text x="56" y="422" fill="#ffcc44" font-size="11" font-weight="600">NEW</text>
  <text x="56" y="450" fill="#ededf0" font-size="22" font-weight="300">3</text>

  <rect x="204" y="398" width="152" height="70" rx="10" fill="#1e1e22"/>
  <text x="220" y="422" fill="#b0b0c0" font-size="11" font-weight="600">THIS WEEK</text>
  <text x="220" y="450" fill="#ededf0" font-size="22" font-weight="300">12</text>

  <rect x="368" y="398" width="152" height="70" rx="10" fill="#1e1e22"/>
  <text x="384" y="422" fill="#b0b0c0" font-size="11" font-weight="600">CATEGORIES</text>
  <text x="384" y="450" fill="#ededf0" font-size="22" font-weight="300">6</text>

  <rect x="532" y="398" width="148" height="70" rx="10" fill="#1e1e22"/>
  <text x="548" y="422" fill="#b0b0c0" font-size="11" font-weight="600">PROJECTS</text>
  <text x="548" y="450" fill="#ededf0" font-size="22" font-weight="300">4</text>
