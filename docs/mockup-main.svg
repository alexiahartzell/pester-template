  <rect x="40" y="330" width="8" height="48" rx="4" fill="#666"/>
  <circle cx="72" cy="354" r="8" fill="#5eeaa0" stroke="#5eeaa0" stroke-width="1.5"/>
  <text x="92" y="358" fill="#6b6b76" font-size="14" text-decoration="line-through">recolor fig 1 for manuscript</text>
  <text x="600" y="358" fill="#3578c4" font-size="11">group research</text>

