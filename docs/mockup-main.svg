  <rect x="40" y="276" width="640" height="48" rx="10" fill="#1e1e22"/>
  <rect x="40" y="276" width="8" height="48" rx="4" fill="#2a2a2e"/>
  <line x1="42" y1="276" x2="42" y2="280" stroke="#888" stroke-width="1.5"/>
  <line x1="42" y1="284" x2="42" y2="288" stroke="#888" stroke-width="1.5"/>
  <line x1="42" y1="292" x2="42" y2="296" stroke="#888" stroke-width="1.5"/>
  <line x1="42" y1="300" x2="42" y2="304" stroke="#888" stroke-width="1.5"/>
  <line x1="42" y1="308" x2="42" y2="312" stroke="#888" stroke-width="1.5"/>
  <line x1="42" y1="316" x2="42" y2="320" stroke="#888" stroke-width="1.5"/>
  <circle cx="72" cy="300" r="8" fill="none" stroke="#6b6b76" stroke-width="1.5"/>
  <circle cx="540" cy="297" r="3" fill="#8888a0"/>
  <circle cx="550" cy="297" r="3" fill="#2e2e33"/>
  <circle cx="560" cy="297" r="3" fill="#2e2e33"/>
  <text x="92" y="304" fill="#ededf0" font-size="14">project meeting</text>
  <text x="572" y="297" fill="#6b6b76" font-size="11">1pm–2pm</text>
  <text x="572" y="311" fill="#ee8855" font-size="11">my meetings</text>
